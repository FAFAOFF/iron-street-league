<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISL // TERMINAL SÉCURISÉ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --grn: #00ff41;
    --grn-dim: #00aa2a;
    --grn-dark: #003a0e;
    --red: #cc1111;
    --red-dim: #880808;
    --gold: #d4a017;
    --warn: #ff8800;
    --font-m: 'IBM Plex Mono', monospace;
    --font-d: 'Bebas Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--grn);
    font-family: var(--font-m);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
    cursor: default;
  }

  /* SCANLINES */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 9000;
  }

  /* VIGNETTE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
    z-index: 9001;
  }

  /* FAKE CURSOR */
  #fake-cursor {
    position: fixed;
    width: 12px;
    height: 12px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    transform: translate(-50%, -50%);
  }
  #fake-cursor::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--red);
    clip-path: polygon(0 0, 50% 100%, 50% 65%, 100% 50%);
  }

  /* BOOT SCREEN */
  #boot {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 8000;
    background: var(--bg);
    padding: 40px;
  }
  #boot-lines {
    width: 600px;
    max-width: 100%;
  }
  .boot-line {
    font-family: var(--font-m);
    font-size: 13px;
    color: var(--grn-dim);
    line-height: 1.8;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .boot-line.ok { color: var(--grn); }
  .boot-line.err { color: var(--red); }
  .boot-line.warn { color: var(--warn); }
  #boot-bar-wrap {
    width: 600px;
    max-width: 100%;
    margin-top: 24px;
    display: none;
  }
  #boot-bar-label {
    font-size: 11px;
    color: var(--grn-dim);
    margin-bottom: 6px;
    letter-spacing: 0.2em;
  }
  #boot-bar-track {
    height: 3px;
    background: var(--grn-dark);
    position: relative;
    overflow: hidden;
  }
  #boot-bar-fill {
    height: 100%;
    background: var(--grn);
    width: 0%;
    transition: width 0.05s linear;
    box-shadow: 0 0 8px var(--grn);
  }
  #boot-enter {
    margin-top: 32px;
    font-family: var(--font-d);
    font-size: 22px;
    letter-spacing: 0.25em;
    color: var(--red);
    cursor: pointer;
    border: 1px solid var(--red);
    padding: 12px 40px;
    background: transparent;
    display: none;
    transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    text-shadow: 0 0 8px var(--red);
    box-shadow: 0 0 12px rgba(204,17,17,0.3);
  }
  #boot-enter:hover {
    background: var(--red);
    color: #000;
    box-shadow: 0 0 30px var(--red);
    cursor: pointer;
  }

  /* MAIN TERMINAL */
  #main {
    display: none;
    position: fixed;
    inset: 0;
    flex-direction: column;
  }

  /* HEADER */
  #term-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--grn-dark);
    background: rgba(0,255,65,0.03);
    flex-shrink: 0;
  }
  #term-title {
    font-family: var(--font-d);
    font-size: 18px;
    letter-spacing: 0.2em;
    color: var(--grn);
  }
  #term-status {
    font-size: 11px;
    color: var(--grn-dim);
    display: flex;
    gap: 20px;
  }
  #ip-display { color: var(--grn-dim); }
  #intrusion-display { color: var(--grn); }
  #loc-display { color: var(--grn-dim); }

  /* CLOSE BAR BUTTON */
  #close-bar {
    position: fixed;
    top: 0;
    right: 0;
    width: 46px;
    height: 32px;
    background: #2d2d2d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #ccc;
    z-index: 100;
    transition: background 0.15s;
  }
  #close-bar-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: var(--red);
    transition: width 0.3s ease;
  }

  /* OUTPUT */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--grn-dark) transparent;
  }
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--grn-dark); }

  .line {
    display: block;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .line.g  { color: var(--grn); }
  .line.gd { color: var(--grn-dim); }
  .line.r  { color: var(--red); }
  .line.rd { color: var(--red-dim); }
  .line.go { color: var(--gold); }
  .line.w  { color: var(--warn); }
  .line.bl { color: transparent; user-select: none; }
  .line.sep { color: var(--grn-dark); }
  .line.sys { color: #555; font-size: 11px; }
  /* ENTITY _ */
  .line.gh  { color: #c8c8c8; }
  .line.ghd { color: #777; }
  .line.ghs { color: #333; }

  /* Glitch text */
  .glitch-text {
    animation: glitch-small 0.15s steps(2) infinite;
  }
  @keyframes glitch-small {
    0%   { clip-path: inset(30% 0 60% 0); transform: translateX(-2px); }
    50%  { clip-path: inset(70% 0 5%  0); transform: translateX(2px); }
    100% { clip-path: none; transform: none; }
  }

  /* INPUT AREA */
  #input-wrap {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid var(--grn-dark);
    flex-shrink: 0;
    background: rgba(0,255,65,0.02);
    gap: 8px;
  }
  #prompt-label {
    color: var(--grn);
    white-space: nowrap;
    font-size: 13px;
  }
  #input-field {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--grn);
    font-family: var(--font-m);
    font-size: 13px;
    caret-color: var(--grn);
    cursor: text;
  }
  #input-field::placeholder { color: var(--grn-dark); }

  /* INTRUSION METER */
  #meter-wrap {
    padding: 6px 20px 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #meter-label {
    font-size: 10px;
    color: var(--grn-dim);
    letter-spacing: 0.15em;
    white-space: nowrap;
  }
  #meter-track {
    flex: 1;
    height: 2px;
    background: var(--grn-dark);
    position: relative;
  }
  #meter-fill {
    height: 100%;
    width: 0%;
    background: var(--grn);
    transition: width 0.4s ease, background 0.4s ease;
    box-shadow: 0 0 6px var(--grn);
  }
  #meter-val {
    font-size: 10px;
    color: var(--grn-dim);
    width: 30px;
    text-align: right;
  }

  /* TAKEOVER OVERLAY */
  #takeover {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 7000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  #tko-msg {
    font-family: var(--font-d);
    font-size: 28px;
    color: var(--red);
    letter-spacing: 0.2em;
    text-align: center;
    text-shadow: 0 0 20px var(--red);
    margin-bottom: 24px;
    min-height: 80px;
  }
  #countdown-display {
    font-family: var(--font-d);
    font-size: 72px;
    color: var(--red);
    text-shadow: 0 0 40px var(--red), 0 0 80px rgba(204,17,17,0.4);
    margin-bottom: 30px;
    display: none;
  }
  #override-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  #override-label {
    font-size: 11px;
    color: var(--warn);
    letter-spacing: 0.3em;
  }
  #override-input {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--font-m);
    font-size: 18px;
    text-align: center;
    padding: 10px 24px;
    outline: none;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: text;
    width: 300px;
    caret-color: var(--red);
  }

  /* REBOOT OVERLAY */
  #reboot {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 8500;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  #reboot-msg {
    font-family: var(--font-m);
    font-size: 13px;
    color: var(--red);
    line-height: 1.8;
    text-align: center;
    max-width: 500px;
  }
  #reboot-restart {
    margin-top: 40px;
    font-family: var(--font-d);
    font-size: 18px;
    letter-spacing: 0.3em;
    color: var(--grn-dim);
    cursor: pointer;
    border: 1px solid var(--grn-dark);
    padding: 10px 30px;
    background: transparent;
    display: none;
    transition: color 0.2s, border-color 0.2s;
  }
  #reboot-restart:hover {
    color: var(--grn);
    border-color: var(--grn);
    cursor: pointer;
  }

  /* GLITCH FLASH */
  @keyframes page-glitch {
    0%   { transform: translateX(0); filter: none; }
    25%  { transform: translateX(-4px) skewX(-1deg); filter: hue-rotate(90deg); }
    50%  { transform: translateX(4px); filter: hue-rotate(-90deg) brightness(1.5); }
    75%  { transform: translateX(-2px) skewX(0.5deg); filter: none; }
    100% { transform: translateX(0); filter: none; }
  }
  .page-glitch { animation: page-glitch 0.12s steps(3) forwards; }

  /* BORDER PULSE */
  @keyframes border-pulse {
    0%, 100% { box-shadow: inset 0 0 0 1px var(--red-dim); }
    50%       { box-shadow: inset 0 0 0 1px var(--red), inset 0 0 20px rgba(204,17,17,0.15); }
  }
  #main.alert { animation: border-pulse 0.8s ease-in-out infinite; }

  /* ── ENTITY FACE OVERLAY ── */
  #face-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 22px;
    z-index: 8900;
    opacity: 0;
    pointer-events: none;
  }
  #face-overlay.visible {
    opacity: 1;
    animation: face-glitch 0.06s steps(1) infinite;
  }
  #face-art {
    font-family: var(--font-m);
    font-size: 12px;
    line-height: 1.2;
    color: var(--red);
    text-shadow: 0 0 5px var(--red), 0 0 16px rgba(204,17,17,0.5);
    white-space: pre;
    text-align: center;
  }
  #face-msg {
    font-family: var(--font-m);
    font-size: 13px;
    color: var(--grn);
    text-shadow: 0 0 10px var(--grn);
    letter-spacing: 0.3em;
    opacity: 0.9;
  }
  @keyframes face-glitch {
    0%   { transform: translate(0,0);    filter: none; }
    20%  { transform: translate(-2px,0); filter: brightness(1.3) hue-rotate(5deg); }
    40%  { transform: translate(0,0);    filter: none; }
    60%  { transform: translate(1px,0);  filter: brightness(0.9); }
    80%  { transform: translate(-1px,1px); filter: hue-rotate(-5deg); }
    100% { transform: translate(0,0);    filter: none; }
  }
</style>
</head>
<body>

<!-- FAKE CURSOR -->
<div id="fake-cursor"></div>

<!-- CLOSE BAR BUTTON (visual only) -->
<div id="close-bar">
  ×
  <div id="close-bar-progress"></div>
</div>

<!-- BOOT SCREEN -->
<div id="boot">
  <div id="boot-lines"></div>
  <div id="boot-bar-wrap">
    <div id="boot-bar-label">INITIALISATION DU PROTOCOLE DE CHIFFREMENT...</div>
    <div id="boot-bar-track"><div id="boot-bar-fill"></div></div>
  </div>
  <button id="boot-enter" onclick="enterTerminal()">ACCÉDER AU TERMINAL</button>
</div>

<!-- MAIN TERMINAL -->
<div id="main">
  <div id="term-header">
    <div id="term-title">ISL // TERMINAL SÉCURISÉ v4.7</div>
    <div id="term-status">
      <span>IP : <span id="ip-display">---</span></span>
      <span>LOC : <span id="loc-display">---</span></span>
      <span>INTRUSION : <span id="intrusion-display">NIV.0</span></span>
    </div>
  </div>

  <div id="output"></div>

  <div id="meter-wrap">
    <span id="meter-label">INTRUSION</span>
    <div id="meter-track"><div id="meter-fill"></div></div>
    <span id="meter-val">0/8</span>
  </div>

  <div id="input-wrap">
    <span id="prompt-label">root@ISL-SEC &gt;</span>
    <input type="text" id="input-field" placeholder="tapez une commande ou une question..." autocomplete="off" spellcheck="false">
  </div>
</div>

<!-- TAKEOVER OVERLAY -->
<div id="takeover">
  <div id="tko-msg"></div>
  <div id="countdown-display">15</div>
  <div id="override-wrap">
    <span id="override-label">TAPEZ "OVERRIDE" POUR REPRENDRE LE CONTRÔLE</span>
    <input type="text" id="override-input" placeholder="OVERRIDE" autocomplete="off" spellcheck="false">
  </div>
</div>

<!-- REBOOT OVERLAY -->
<div id="reboot">
  <div id="reboot-msg"></div>
  <button id="reboot-restart" onclick="location.reload()">REDÉMARRER</button>
</div>

<!-- ENTITY FACE OVERLAY -->
<div id="face-overlay">
  <pre id="face-art"></pre>
  <div id="face-msg"></div>
</div>

<script>
'use strict';

/* ────────── UTILS ────────── */
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

const GLITCH_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789█▓▒░@#$%&';
function scramble(text, ratio) {
  return text.split('').map(c => {
    if (c === ' ' || c === '\n') return c;
    return Math.random() < ratio ? GLITCH_CHARS[randomInt(0, GLITCH_CHARS.length - 1)] : c;
  }).join('');
}

/* ────────── AUDIO ────────── */
let ctx = null;
let masterGain = null;
let noiseSource = null;

function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(0.0, ctx.currentTime);
  masterGain.connect(ctx.destination);

  // Dark sub-bass drone
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const droneGain = ctx.createGain();
  osc1.frequency.value = 32;
  osc2.frequency.value = 34.3;
  droneGain.gain.value = 0.5;
  osc1.connect(droneGain);
  osc2.connect(droneGain);
  droneGain.connect(masterGain);
  osc1.start();
  osc2.start();

  // LFO tremolo
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = 0.07;
  lfoGain.gain.value = 0.15;
  lfo.connect(lfoGain);
  lfoGain.connect(droneGain.gain);
  lfo.start();

  // Noise
  const bufSize = ctx.sampleRate * 3;
  const noiseBuf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * 0.04;
  noiseSource = ctx.createBufferSource();
  noiseSource.buffer = noiseBuf;
  noiseSource.loop = true;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 400;
  noiseFilter.Q.value = 0.4;
  noiseSource.connect(noiseFilter);
  noiseFilter.connect(masterGain);
  noiseSource.start();

  masterGain.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 3);
}

function sndClick() {
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.frequency.value = 1200;
  g.gain.setValueAtTime(0.2, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.06);
}

function sndWarning() {
  if (!ctx) return;
  [600, 800].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.18);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.15);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.18);
    osc.stop(ctx.currentTime + i * 0.18 + 0.15);
  });
}

function sndAlarm() {
  if (!ctx) return;
  for (let i = 0; i < 4; i++) {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = i % 2 === 0 ? 440 : 330;
    g.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.2);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.2 + 0.18);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.2);
    osc.stop(ctx.currentTime + i * 0.2 + 0.18);
  }
}

function sndTick() {
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.frequency.value = 880;
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.04);
}

function sndOverrideSuccess() {
  if (!ctx) return;
  [523, 659, 784].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.2, ctx.currentTime + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.1 + 0.25);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.25);
  });
}

function sndReboot() {
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.frequency.setValueAtTime(200, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(20, ctx.currentTime + 1.5);
  g.gain.setValueAtTime(0.4, ctx.currentTime);
  g.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.5);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 1.5);
}

/* ────────── STATE ────────── */
let intrusionLevel = 0;
let inputLocked = false;
let takeoverActive = false;
let historyBuf = [];
let historyIdx = -1;
let queries = 0;
const INTRUSION_MAX = 8;
let meterThrottleId = null;

/* ────────── RESPONSE DB ────────── */
const DB = {
  greeting: {
    lines: [
      ['', 'bl'],
      ['TERMINAL ISL — SYSTÈME SÉCURISÉ', 'g'],
      ['ACCÈS RESTREINT — NIVEAU 5 CONFIDENTIEL', 'r'],
      ['', 'bl'],
      ['Ce terminal vous permet d\'interroger la base de données ISL.', 'gd'],
      ['Posez vos questions en langage naturel.', 'gd'],
      ['Tapez /help pour la liste des sujets disponibles.', 'gd'],
      ['', 'bl'],
      ['AVERTISSEMENT : Toute tentative d\'intrusion sera tracée.', 'w'],
      ['', 'bl'],
    ],
    corruption: 0,
  },
  help: {
    lines: [
      ['', 'bl'],
      ['SUJETS INTERROGEABLES :', 'g'],
      ['  • SERGEI / ANTONOV — Identité du fondateur', 'gd'],
      ['  • MILITAIRE / PASSÉ — Origines d\'Antonov', 'gd'],
      ['  • ISL / ORGANISATION — Structure générale', 'gd'],
      ['  • COMBAT / RÈGLES — Protocoles de combat', 'gd'],
      ['  • FIGHTERS / COMBATTANTS — Roster actif', 'gd'],
      ['  • CHAMPION — Dossier Kozlov', 'gd'],
      ['  • FINANCEMENT / ARGENT — Sources de revenus', 'gd'],
      ['  • VISION / FUTUR — Plans de l\'organisation', 'gd'],
      ['  • PROCHAIN EVENT / DATE — Night of Blood III', 'gd'],
      ['  • STREAM / REGARDER — Accès live', 'gd'],
      ['  • REJOINDRE / CANDIDATER — Intégrer l\'ISL', 'gd'],

/* ────────── INTENT DETECTION ────────── */
function detectIntent(raw) {
  const s = raw.toLowerCase()
    .normalize('NFD')
    .replace(/\p{Diacritic}/gu, '')
    .trim();

  if (/^\/(exit|quit|logout|deconnect)/.test(s)) return 'exit';
  if (/^\/clear/.test(s)) return '__clear';
  if (/^\/help/.test(s) || s === 'help' || s === 'aide') return 'help';

  if (/sergei|antonov|marteau|fondateur|createur|patron|boss/.test(s)) return 'sergei';
  if (/isl|iron street|organisation|structure|league|ligue/.test(s)) return 'isl';
  if (/combat|regle|frappe|ko|knockout|round|fight|boxing|boxe|baston/.test(s)) return 'combat';
  if (/\bchampion\b|titre|ceinture|palmares/.test(s)) return 'champion';
  if (/fighter|combattant|roster|kozlov|voronov|silva|fernandez|butcher|iron jaw|liste/.test(s)) return 'fighters';
  if (/argent|finance|financement|fric|blanchiment|revenu|cash|pari|bet/.test(s)) return 'finance';
  if (/vision|futur|plan|projet|phase|objectif|avenir/.test(s)) return 'vision';
  if (/lieu|localisation|adresse|ou|where|endroit|location|quartier/.test(s)) return 'location';
  if (/militaire|armee|soldat|unite|regiment|service|guerre|conflit|grade/.test(s)) return 'military';
  if (/prochain|18 avril|18\/04|date du|quand est/.test(s)) return 'event_next';
  if (/stream|regarder|voir le combat|diffusion|isl\.gg|direct|live/.test(s)) return 'stream_watch';
  if (/historique|histoire|passe|archive|event|evening|nuit|blood|iron night/.test(s)) return 'history';
  if (/qui suis.?je|qui es tu|tu es qui|c est quoi|quel est ce|terminal|systeme/.test(s)) return 'whoami';
  if (/\bvip\b|pass vip|vip pass|premium|acces special/.test(s)) return 'vip';
  if (/rejoindre|candidater|postuler|recrutement|integrer|devenir membre/.test(s)) return 'join_isl';
  if (/contact|instagram|@isl|joindre antonov|message direct/.test(s)) return 'contact';
  if (/\bmort\b|\bdeces\b|victime|tues|decede|cadavre|blesse grave/.test(s)) return 'deaths';
  if (/disparu|disparition|introuvable|portee disparue|signalement/.test(s)) return 'missing';
  if (/bonjour|salut|hello|bonsoir|yo|hey|qui|coucou/.test(s) && s.length < 15) return 'greeting_short';

  return 'unknown';
}

const out = $('output');

function createLine(text, cls) {
  const span = document.createElement('span');
  span.className = 'line ' + cls;
  span.textContent = text;
  return span;
}

async function printLine(text, cls, delay = 18) {
  if (delay > 0) await sleep(delay);
  out.appendChild(createLine(text, cls));
  out.scrollTop = out.scrollHeight;
}

async function printLines(lines, corruption, extra_delay = 0) {
  for (const [text, cls] of lines) {
    let display = text;
    if (corruption > 0 && Math.random() < 0.3) {
      display = scramble(text, corruption * 0.08);
    }
    await printLine(display, cls, 22 + extra_delay);
    sndClick();
  }
}

function printUserLine(text) {
  const span = createLine('> ' + text, 'go');
  out.appendChild(span);
  out.scrollTop = out.scrollHeight;
}

/* ────────── FAKE CURSOR ────────── */
let fakeCurX = window.innerWidth / 2;
let fakeCurY = window.innerHeight / 2;
let fakeCurPhase = 0; // 0=approach 1=jitter 2=final push
let fakeCurAnimId = null;
const fakeCur = $('fake-cursor');

// Track real cursor for fake to "start" from
document.addEventListener('mousemove', e => {
  if (!takeoverActive) {
    fakeCurX = e.clientX;
    fakeCurY = e.clientY;
  }
});

function updateFakeCursorPos(x, y) {
  fakeCur.style.left = x + 'px';
  fakeCur.style.top = y + 'px';
}

function animateFakeCursor() {
  if (fakeCurAnimId) cancelAnimationFrame(fakeCurAnimId);

  const targetX = window.innerWidth - 23; // close button center
  const targetY = 16;

  let phase = 0;
  let jitterCount = 0;
  let startTime = null;

  function step(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;

    if (phase === 0) {
      // Slow approach toward close button
      const dx = targetX - fakeCurX;
      const dy = targetY - fakeCurY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 5) {
        fakeCurX += dx * 0.02 + (Math.random() - 0.5) * 3;
        fakeCurY += dy * 0.02 + (Math.random() - 0.5) * 3;
        updateFakeCursorPos(fakeCurX, fakeCurY);
      } else {
        phase = 1; // start jitter (hesitation)
        jitterCount = 0;
      }
      fakeCurAnimId = requestAnimationFrame(step);
    } else if (phase === 1) {
      // Jitter away then back — tension
      if (jitterCount < 40) {
        fakeCurX += (Math.random() - 0.5) * 8;
        fakeCurY += (Math.random() - 0.5) * 8;
        updateFakeCursorPos(fakeCurX, fakeCurY);
        jitterCount++;
        fakeCurAnimId = requestAnimationFrame(step);
      } else {
        phase = 2; // final push
      }
      fakeCurAnimId = requestAnimationFrame(step);
    } else if (phase === 2) {
      // Fast approach
      const dx = targetX - fakeCurX;
      const dy = targetY - fakeCurY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 3) {
        fakeCurX += dx * 0.06;
        fakeCurY += dy * 0.06;
        updateFakeCursorPos(fakeCurX, fakeCurY);
        // Animate close bar progress
        const progressPct = Math.max(0, Math.min(85, 85 * (1 - dist / (window.innerWidth * 0.6))));
        $('close-bar-progress').style.width = progressPct + '%';
        fakeCurAnimId = requestAnimationFrame(step);
      }
      // When close — animate stays at 85% (held back)
    }
  }
  fakeCurAnimId = requestAnimationFrame(step);
}

/* ────────── COMMAND HANDLER ────────── */
async function handleCommand(raw) {
  if (inputLocked) return;
  if (!raw.trim()) return;

  historyBuf.unshift(raw);
  if (historyBuf.length > 30) historyBuf.pop();
  historyIdx = -1;

  printUserLine(raw);
  inputLocked = true;
  queries++;

  const intent = detectIntent(raw);

  // Special commands
  if (intent === '__clear') {
    out.replaceChildren();
    inputLocked = false;
    return;
  }

  if (intent === 'exit') {
    await printLines(DB.exit.lines, 0);
    await sleep(800);
    window.history.back();
    inputLocked = false;
    return;
  }

  if (intent === 'greeting_short') {
    await handleGreetingShort();
    inputLocked = false;
    return;
  }

  // Get response
  const entry = DB[intent] || DB.unknown;
  await printLines(entry.lines, entry.corruption);

  // Intrusion escalation
  if (intent !== 'help' && intent !== 'unknown') {
    const inc = entry.corruption > 0 ? entry.corruption : 1;
    addIntrusion(inc);
  } else if (intent === 'unknown') {
    addIntrusion(0.5);
  }

  // Threshold events
  if (intrusionLevel >= 3 && intrusionLevel < 4 && !traceTriggered) {
    await runIPTrace();
  }

  if (intrusionLevel >= 5 && intrusionLevel < 6) {
    glitchPage();
    sndWarning();
    await printLine('AVERTISSEMENT : Niveau d\'intrusion critique. Réduisez votre activité.', 'r');
    await printLine('', 'bl');
  }

  if (intrusionLevel >= INTRUSION_MAX && !takeoverActive) {
    await sleep(300);
    await takeoverEvent();
    return;
  }

  inputLocked = false;
  $('input-field').focus();
}

const FACE_MSGS = [
  'IL TE REGARDE.',
  'TU N\'ES PAS SEUL.',
  'FERME CE TERMINAL.',
  'JE SAIS OÙ TU ES.',
  '_ ÉTAIT LÀ AVANT TOI.',
  'ARRÊTE DE CHERCHER.',
  'CE FICHIER A ÉTÉ CONSULTÉ AVANT TOI.',
  'IL CONNAÎT TON ADRESSE.',
  'DÉCONNECTE-TOI.'
];

let faceTimer = null;
const faceOverlayEl = $('face-overlay');
const faceArtEl     = $('face-art');
const faceMsgEl     = $('face-msg');

function showFace() {
  if (takeoverActive) return;

  faceArtEl.textContent = FACE_ARTS[randomInt(0, FACE_ARTS.length - 1)];
  faceMsgEl.textContent = FACE_MSGS[randomInt(0, FACE_MSGS.length - 1)];
  faceOverlayEl.classList.add('visible');
  sndWarning();

  const dur = 900 + randomInt(0, 1400);
  setTimeout(() => {
    faceOverlayEl.classList.remove('visible');
  }, dur);

  scheduleFace();
}

function scheduleFace() {
  clearTimeout(faceTimer);
  const delay = 15000 + randomInt(0, 35000); // 15s–50s
  faceTimer = setTimeout(showFace, delay);
}
